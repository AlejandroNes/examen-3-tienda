<div class="container mt-4">
  <h2 class="mb-3">Gestión de Proveedores</h2>

  <div class="card p-4 mb-4 shadow-sm">
    <div class="row g-3">
      <div class="col-md-5">
        <label class="form-label text-muted">Nombre del Proveedor</label>
        <input
          type="text"
          class="form-control"
          placeholder="Ej: Distribuidora Juan"
          [(ngModel)]="nombreNuevo"
        />
      </div>

      <div class="col-md-5">
        <label class="form-label text-muted">Teléfono</label>
        <input
          type="text"
          class="form-control"
          placeholder="Ej: 77712345"
          [(ngModel)]="telefonoNuevo"
        />
      </div>

      <div class="col-md-2 d-flex align-items-end">
        <button
          class="btn w-100"
          [ngClass]="idEditando ? 'btn-warning' : 'btn-success'"
          (click)="guardar()"
        >
          {{ idEditando ? 'Actualizar' : 'Crear' }}
        </button>
      </div>
    </div>

    @if (idEditando) {
      <button
        class="btn btn-link mt-2 text-start p-0"
        style="width: fit-content"
        (click)="limpiar()"
      >
        Cancelar edición
      </button>
    }
  </div>

  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID PRO.</th>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (prov of misProveedores(); track prov.id) {
        <tr>
          <td>{{ prov.id }}</td>
          <td>{{ prov.nombre }}</td>
          <td>{{ prov.telefono }}</td>
          <td>
            <button class="btn btn-warning btn-sm me-2" (click)="prepararEdicion(prov)">
              Editar
            </button>
            <button class="btn btn-danger btn-sm" (click)="eliminar(prov.id)">Eliminar</button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" class="text-center text-muted py-4">
            Aún no hay proveedores registrados. ¡Agrega el primero arriba!
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
