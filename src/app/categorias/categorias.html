<div class="container mt-4">
  <h2 class="mb-3">Categorías De la Tienda</h2>

  <div class="input-group mb-4">
    <input
      type="text"
      class="form-control"
      placeholder="Escribe una categoría..."
      [(ngModel)]="nombreNuevo"
    />
    <button class="btn btn-success" (click)="guardar()">Guardar Categoría</button>
  </div>

  <ul class="list-group">
    @for (cat of misCategorias(); track cat.id) {
      <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ cat.nombre }}
        <button class="btn btn-danger btn-sm" (click)="eliminar(cat.id)">Borrar</button>
      </li>
    } @empty {
      <li class="list-group-item">No hay categorías disponibles... ¡Agrega una arriba!</li>
    }
  </ul>
</div>
